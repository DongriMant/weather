<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>玄関お天気モニタ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    margin: 0;
    padding: 16px;
    color: #fff;
    text-align: center;
  }

  .date { font-size: 20px; margin-bottom: 6px; opacity: 0.9; }
  .top { font-size: 43px; font-weight: 700; }
  .mid { font-size: 27px; margin-top: 6px; }
  .small { font-size: 19px; margin-top: 6px; }
  .label { font-size: 19px; opacity: 0.95; }
  .cell { font-size: 21px; }

  .row {
    display: flex;
    justify-content: space-around;
    margin-top: 12px;
  }

  .box {
    margin-top: 14px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<div class="date" id="todayDate"></div>
<div class="top" id="todaySummary">取得中...</div>
<div class="mid" id="tempToday"></div>
<div class="small" id="nowRain"></div>

<div class="box">
  <div class="label">3時間毎の降水確率</div>
  <div class="row" id="threeHours"></div>
</div>

<div class="box">
  <div class="label" id="tomorrowLabel">明日の傘予報</div>
  <div class="mid" id="tomorrowSummary"></div>
  <div class="small" id="tempTomorrow"></div>
</div>

<div class="small" id="update"></div>

<script>
const lat = 35.6074;
const lon = 140.1065;

const weekdays = ["日","月","火","水","木","金","土"];

function formatDateJP(date){
  return `${date.getMonth()+1}/${date.getDate()}(${weekdays[date.getDay()]})`;
}

function judgeUmbrella(maxProb){
  if(maxProb >= 60) return "☔ 傘：必要";
  if(maxProb >= 30) return "🌂 傘：念のため";
  return "☀ 傘：不要";
}

async function fetchWeather(){
  const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&hourly=precipitation_probability,temperature_2m` +
    `&timezone=Asia%2FTokyo`;

  const res = await fetch(url);
  const data = await res.json();

  const now = new Date();
  const hour = now.getHours();

  // 今日の日付表示
  document.getElementById("todayDate").innerText =
    `今日 ${formatDateJP(now)}`;

  const probs = data.hourly.precipitation_probability;
  const temps = data.hourly.temperature_2m;

  // --- 今日
  const todaySlice = probs.slice(hour, 24);
  const todayMax = Math.max(...todaySlice);

  document.getElementById("todaySummary").innerText =
    `${judgeUmbrella(todayMax)}`;

  document.getElementById("nowRain").innerText =
    `現在の降水確率：${probs[hour]}%`;

  const todayTemps = temps.slice(0, 24);
  document.getElementById("tempToday").innerText =
    `今日 ${Math.min(...todayTemps).toFixed(1)}℃ / ${Math.max(...todayTemps).toFixed(1)}℃`;

  // 背景色
  if (todayMax >= 60) document.body.style.backgroundColor = "#d32f2f";
  else if (todayMax >= 30) document.body.style.backgroundColor = "#f9a825";
  else document.body.style.backgroundColor = "#1976d2";

  // --- 3時間ごと
  const container = document.getElementById("threeHours");
  container.innerHTML = "";

  let start = Math.ceil(hour / 3) * 3;
  for(let i=0; i<5; i++){
    let h = start + i * 3;
    if(h >= 24) break;

    const div = document.createElement("div");
    div.className = "cell";
    div.innerHTML = `${h}時<br>${probs[h]}%`;
    container.appendChild(div);
  }

  // --- 明日
  const tomorrow = new Date();
  tomorrow.setDate(now.getDate() + 1);

  document.getElementById("tomorrowLabel").innerText =
    `明日 ${formatDateJP(tomorrow)} の傘予報`;

  const tomorrowSlice = probs.slice(24 + 6, 24 + 10);
  const tomorrowMax = Math.max(...tomorrowSlice);

  document.getElementById("tomorrowSummary").innerText =
    `${judgeUmbrella(tomorrowMax)}`;

  const tomorrowTemps = temps.slice(24, 48);
  document.getElementById("tempTomorrow").innerText =
    `明日 ${Math.min(...tomorrowTemps).toFixed(1)}℃ / ${Math.max(...tomorrowTemps).toFixed(1)}℃`;

  document.getElementById("update").innerText =
    `更新：${now.toLocaleTimeString()}`;
}

fetchWeather();
setInterval(fetchWeather, 600000);
</script>

</body>
</html>
