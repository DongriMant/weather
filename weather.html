<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>玄関お天気モニタ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    margin: 0;
    padding: 16px;
    color: #fff;
    text-align: center;
  }

  .date { font-size: 20px; margin-bottom: 6px; opacity: 0.9; }
  .top { font-size: 43px; font-weight: 700; }
  .mid { font-size: 27px; margin-top: 6px; }
  .small { font-size: 19px; margin-top: 6px; }
  .label { font-size: 19px; opacity: 0.95; }
  .cell { font-size: 21px; }

  .row {
    display: flex;
    justify-content: space-around;
    margin-top: 12px;
  }

  .box {
    margin-top: 14px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<div class="date" id="todayDate"></div>
<div class="top" id="todaySummary">取得中...</div>
<div class="mid" id="tempToday"></div>
<div class="small" id="nowRain"></div>

<div class="box">
  <div class="label">3時間毎の降水確率</div>
  <div class="row" id="threeHours"></div>
</div>

<div class="box">
  <div class="label" id="tomorrowLabel">明日の傘予報</div>
  <div class="mid" id="tomorrowSummary"></div>
  <div class="small" id="tempTomorrow"></div>
</div>

<div style="position:fixed; bottom:0; left:0; width:100%; display:flex;">
  <button onclick="changeLocation(0)" id="btn0" style="flex:1; padding:20px; font-size:20px;">自宅</button>
  <button onclick="changeLocation(1)" id="btn1" style="flex:1; padding:20px; font-size:20px;">高校</button>
  <button onclick="changeLocation(2)" id="btn2" style="flex:1; padding:20px; font-size:20px;">職場</button>
</div>

<div class="small" id="update"></div>

<script>
const locations = [
  {lat:35.602, lon:140.125}, // 自宅（仮）
  {lat:35.714, lon:140.044}, // 高校（仮）
  {lat:35.669, lon:139.803}  // 職場（仮）
];

let currentIndex = 0;

const weekdays = ["日","月","火","水","木","金","土"];

function formatDateJP(date){
  return `${date.getMonth()+1}/${date.getDate()}(${weekdays[date.getDay()]})`;
}

function judgeUmbrella(maxProb){
  if(maxProb >= 60) return "☔ 傘：必要";
  if(maxProb >= 30) return "🌂 傘：念のため";
  return "☀ 傘：不要";
}

function highlightButton(){
  for(let i=0;i<3;i++){
    const btn = document.getElementById("btn"+i);
    if(btn){
      btn.style.background = (i===currentIndex) ? "#333" : "#ddd";
      btn.style.color = (i===currentIndex) ? "#fff" : "#000";
    }
  }
}

function changeLocation(index){
  currentIndex = index;
  highlightButton();
  fetchWeather();
}

async function fetchWeather(){
  try {
    const loc = locations[currentIndex];

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
      `&hourly=precipitation_probability,temperature_2m` +
      `&timezone=Asia%2FTokyo&forecast_days=2`;

    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const hour = now.getHours();

    document.getElementById("todayDate").innerText =
      `今日 ${formatDateJP(now)}`;

    const probs = data.hourly.precipitation_probability;
    const temps = data.hourly.temperature_2m;

    // 今日
    const todayMax = Math.max(...probs.slice(0,24));

    document.getElementById("todaySummary").innerText =
      judgeUmbrella(todayMax);

    document.getElementById("nowRain").innerText =
      `現在の降水確率：${probs[hour]}%`;

    document.getElementById("tempToday").innerText =
      `今日 ${Math.min(...temps.slice(0,24)).toFixed(1)}℃ / ${Math.max(...temps.slice(0,24)).toFixed(1)}℃`;

    // 背景色
    if (todayMax >= 60) document.body.style.backgroundColor = "#d32f2f";
    else if (todayMax >= 30) document.body.style.backgroundColor = "#f9a825";
    else document.body.style.backgroundColor = "#1976d2";

    // 3時間
    const container = document.getElementById("threeHours");
    container.innerHTML = "";

    function peak3h(h){
      return Math.max(...probs.slice(h-1,h+2));
    }

    [9,12,15,18,21].forEach(h=>{
      const div = document.createElement("div");
      div.className = "cell";
      div.innerHTML = `${h}時<br>${peak3h(h)}%`;
      container.appendChild(div);
    });

    // 明日
    const tomorrow = new Date();
    tomorrow.setDate(now.getDate()+1);

    document.getElementById("tomorrowLabel").innerText =
      `明日 ${formatDateJP(tomorrow)} の傘予報`;

    const tomorrowMax = Math.max(...probs.slice(24+6,24+10));

    document.getElementById("tomorrowSummary").innerText =
      judgeUmbrella(tomorrowMax);

    const tTemps = temps.slice(24,48);
    document.getElementById("tempTomorrow").innerText =
      `明日 ${Math.min(...tTemps).toFixed(1)}℃ / ${Math.max(...tTemps).toFixed(1)}℃`;

    document.getElementById("update").innerText =
      `更新：${now.toLocaleTimeString()}`;

  } catch(e){
    document.getElementById("todaySummary").innerText = "取得エラー";
  }
}

fetchWeather();
highlightButton();
setInterval(fetchWeather,600000);
</script>

</body>
</html>
